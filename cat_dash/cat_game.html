<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>キャットダッシュ縦長版</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: #fdf6e3; overflow: hidden; touch-action: manipulation; }
        #gameWrapper { position: relative; width: 95vw; max-width: 400px; height: 90vh; }
        canvas { width: 100%; height: 100%; border: 4px solid #5d4037; background-color: #fff; border-radius: 10px; display: block; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        button { padding: 20px 40px; font-size: 22px; cursor: pointer; width: 80%; margin: 10px; border-radius: 20px; border: none; background: #5d4037; color: white; font-weight: bold; }
        #rankList { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border: 3px solid #5d4037; border-radius: 10px; display: none; z-index: 20; width: 80%; height: 60%; overflow-y: auto; }
        .heart { color: #ff5252; margin-right: 5px; font-size: 24px; }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <canvas id="gameCanvas" width="300" height="800"></canvas>
        <div id="ui" style="position: absolute; top: 10px; left: 10px; pointer-events: none;">
            <div id="livesDisplay"></div>
            <div id="distanceDisplay" style="font-size: 24px; color: #5d4037; font-weight: bold;">距離: 0m</div>
        </div>
        <div id="startScreen">
            <h1>キャットダッシュ</h1>
            <button onclick="startGame()">スタート</button>
            <button onclick="showRanking()">ランキング</button>
        </div>
        <div id="rankList">
            <h3>ランキング (TOP 100)</h3>
            <ul id="rankItems"></ul>
            <button onclick="document.getElementById('rankList').style.display='none'">閉じる</button>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('startScreen');
const livesDisplay = document.getElementById('livesDisplay');
const distanceDisplay = document.getElementById('distanceDisplay');

const catImages = [], bgImg = new Image(), noteImg = new Image(), fishImg = new Image();
bgImg.src = 'images/background.png'; noteImg.src = 'images/note.png'; fishImg.src = 'images/fish.png';
for(let i = 0; i < 4; i++) { catImages[i] = new Image(); catImages[i].src = `images/cat${i}.png`; }

let cat = { x: 30, y: 600, vy: 0, jumpCount: 0 };
let obstacles = [], fish = [], hearts = [], floatingTexts = [], distance = 0, lives = 3, gameActive = false, frame = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycbzmloImQqA6CN6GIbPa9D8O0SdvnkWAx0SVYv4Ec5DuGmeEugIsrfvrFNdTctAOkjAi/exec";

async function saveScoreToSheet(name, score) {
    try { 
        await fetch(GAS_URL, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({ name: name, score: score }) 
        }); 
    } catch(e) { console.error("保存失敗:", e); }
}

async function showRanking() {
    document.getElementById('rankList').style.display = 'block';
    const list = document.getElementById('rankItems');
    list.innerHTML = "読み込み中...";
    try {
        const res = await fetch(GAS_URL);
        const ranking = await res.json();
        list.innerHTML = ranking.map((e, i) => `<li>${i + 1}位: ${e.name} - ${e.score}m</li>`).join('');
    } catch(e) { list.innerHTML = "読み込み失敗：GAS設定を確認してください"; }
}

function handleInput(e) {
    if (e.cancelable) e.preventDefault();
    if (!gameActive) return;
    if (cat.jumpCount < 2) { cat.vy = -15; cat.jumpCount++; }
}

function startGame() { 
    gameActive = true; startScreen.style.display = 'none'; 
    lives = 3; distance = 0; obstacles = []; fish = []; hearts = []; floatingTexts = [];
    updateUI(); update(); 
}

function updateUI() { livesDisplay.innerHTML = '<span class="heart">❤</span>'.repeat(lives); }

function update() {
    if (!gameActive) return;
    cat.vy += 0.8; cat.y += cat.vy;
    if (cat.y > 600) { cat.y = 600; cat.vy = 0; cat.jumpCount = 0; }

    const getSpawnY = () => 500 + Math.random() * 100;

    if (frame % 90 === 0) {
        let pattern = Math.random();
        if (pattern < 0.6) {
            obstacles.push({ x: 300, y: getSpawnY() });
        } else {
            obstacles.push({ x: 300, y: getSpawnY() });
            obstacles.push({ x: 360, y: getSpawnY() });
        }
    }
    
    if (frame % 250 === 0) fish.push({ x: 300, y: getSpawnY() });
    if (frame % 600 === 0) hearts.push({ x: 300, y: getSpawnY() });

    [obstacles, fish, hearts].forEach(arr => arr.forEach((o, i) => {
        o.x -= 5;
        if (o.x < -40) arr.splice(i, 1);
        
        let hitRange = 40;
        if (arr === obstacles) hitRange = 30;
        if (arr === hearts) hitRange = 50;

        if (Math.abs(o.x - cat.x) < hitRange && Math.abs(o.y - cat.y) < hitRange) {
            if (arr === obstacles) { lives--; updateUI(); if(lives <= 0) endGame(); arr.splice(i, 1); }
            else if (arr === fish) { 
                fish.splice(i, 1); distance += 1000; 
                floatingTexts.push({text:"+100m", x:o.x, y:o.y, life:30, color:"#ff9800"});
            }
            else if (arr === hearts) { 
                hearts.splice(i, 1); 
                if(lives < 3) { 
                    lives++; updateUI(); 
                    floatingTexts.push({text:"LIFE UP!", x:o.x, y:o.y, life:30, color:"#ff5252"});
                }
            }
        }
    }));

    distance += 1;
    distanceDisplay.innerText = `距離: ${Math.floor(distance/10)}m`;
    frame++;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, 300, 800);
    ctx.drawImage(bgImg, 0, 0, 300, 800);
    ctx.drawImage(catImages[Math.floor(frame / 8) % 4], cat.x, cat.y, 70, 70);
    obstacles.forEach(o => ctx.drawImage(noteImg, o.x, o.y, 35, 35));
    fish.forEach(f => ctx.drawImage(fishImg, f.x, f.y, 45, 45));
    ctx.fillStyle = '#ff5252'; ctx.font = '30px Arial';
    hearts.forEach(h => ctx.fillText('❤', h.x, h.y));
    
    floatingTexts.forEach((ft, i) => { 
        ft.y -= 2; ft.life--; 
        ctx.fillStyle = ft.color;
        ctx.font = 'bold 24px Arial';
        ctx.fillText(ft.text, ft.x, ft.y);
        if(ft.life <= 0) floatingTexts.splice(i, 1);
    });
}

function endGame() {
    gameActive = false;
    let name = prompt("ゲームオーバー！名前を入力：") || "名無し猫";
    saveScoreToSheet(name, Math.floor(distance / 10));
    location.reload();
}

window.addEventListener('touchstart', handleInput, { passive: false });
window.addEventListener('mousedown', handleInput);
</script>
</body>
</html>
